# The Trace Manifest — Ingestion Worker config
# Deployed separately from the Astro Pages site
name = "trace-manifest-ingestion"
main = "workers/ingestion/index.ts"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trace-manifest-db"
database_id = "1625036a-ffe2-4103-bf9d-086bae150561"

[[r2_buckets]]
binding = "RAW_STORE"
bucket_name = "trace-manifest-raw"

[triggers]
crons = [
  "*/30 * * * *",
  "0 */3 * * *",
  "0 6 * * *",
  "0 9 * * *",
  "0 18 * * *"
]

# Required encrypted secret:
#   npx wrangler secret put TRACE_INTERNAL_SERVICE_SECRET --config wrangler.worker.toml
# It must match the Pages secret. The Worker accepts no browser bearer token.
# Optional encrypted secret for authenticated GitHub API limits:
#   npx wrangler secret put GITHUB_TOKEN --config wrangler.worker.toml
