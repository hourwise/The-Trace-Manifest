# The Trace Manifest — Ingestion Worker config
# Deployed separately from the Astro Pages site
name = "trace-manifest-ingestion"
main = "workers/ingestion/index.ts"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trace-manifest-db"
database_id = "1625036a-ffe2-4103-bf9d-086bae150561"

[[r2_buckets]]
binding = "RAW_STORE"
bucket_name = "trace-manifest-raw"

[triggers]
crons = [
  "*/30 * * * *",
  "0 6 * * *",
  "0 9 * * *",
  "0 12 * * *",
  "0 18 * * *"
]

# Isolated control-plane target for LAUNCH-05R/06 checks. Environment bindings
# are non-inheritable, so each preview resource is named explicitly. No cron
# triggers are configured here: preview must never ingest on a schedule.
[env.preview]
name = "trace-manifest-ingestion-preview"

[env.preview.vars]
TRACE_ENVIRONMENT = "preview"
TRACE_AI_PUBLIC_ENABLED = "false"
TRACE_AI_EDITORIAL_ENABLED = "false"
TRACE_AI_SCHEDULED_ENABLED = "false"
TRACE_AI_GLOBAL_KILL_SWITCH = "false"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "trace-manifest-db-preview"
database_id = "f312f662-2252-4005-8103-1a40d546e16b"

[[env.preview.r2_buckets]]
binding = "RAW_STORE"
bucket_name = "trace-manifest-raw-preview"

# KC-03D: Preview-only producer bindings. Feed admission may enqueue bounded
# capture messages in Preview; no consumer is attached until the capture
# handler and retry policy are implemented. The second queue is reserved for
# that consumer's future dead-letter routing and receives no production binding.
[[env.preview.queues.producers]]
binding = "KNOWLEDGE_PROCESSING_QUEUE"
queue = "trace-manifest-kc-processing-preview"

[[env.preview.queues.producers]]
binding = "KNOWLEDGE_PROCESSING_DLQ"
queue = "trace-manifest-kc-processing-preview-dlq"

[env.preview.triggers]
crons = []

# Required encrypted secret:
#   npx wrangler secret put TRACE_INTERNAL_SERVICE_SECRET --config wrangler.worker.toml
# It must match the Pages secret. The Worker accepts no browser bearer token.
# Preview must use a separately generated TRACE_INTERNAL_SERVICE_SECRET:
#   npx wrangler secret put TRACE_INTERNAL_SERVICE_SECRET --env preview --config wrangler.worker.toml
# Optional encrypted secret for authenticated GitHub API limits:
#   npx wrangler secret put GITHUB_TOKEN --config wrangler.worker.toml
