# The Trace Manifest - Cloudflare Pages / Astro server configuration
name = "the-trace-manifest"
compatibility_date = "2026-07-12"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "trace-manifest-db-preview"
database_id = "f312f662-2252-4005-8103-1a40d546e16b"

# Top-level Pages configuration applies to preview deployments. Keep it
# explicitly non-production so the branch preview never targets live services.
[vars]
TRACE_ENVIRONMENT = "preview"
TRACE_ALLOWED_ORIGINS = "https://launch-05r-preview.the-trace-manifest.pages.dev"
TRACE_AI_PUBLIC_ENABLED = "false"
TRACE_AI_EDITORIAL_ENABLED = "false"
TRACE_AI_SCHEDULED_ENABLED = "false"
TRACE_AI_GLOBAL_KILL_SWITCH = "false"
TRACE_INGESTION_WORKER_URL = "https://trace-manifest-ingestion-preview.philgeran.workers.dev"

[env.production]
name = "the-trace-manifest"

[[env.production.d1_databases]]
binding = "DB"
database_name = "trace-manifest-db"
database_id = "1625036a-ffe2-4103-bf9d-086bae150561"

[env.production.vars]
TRACE_ENVIRONMENT = "production"
TRACE_ALLOWED_ORIGINS = "https://thetracemanifest.com"
TRACE_AI_PUBLIC_ENABLED = "false"
TRACE_AI_EDITORIAL_ENABLED = "true"
TRACE_AI_SCHEDULED_ENABLED = "false"
TRACE_AI_GLOBAL_KILL_SWITCH = "false"
TRACE_INGESTION_WORKER_URL = "https://trace-manifest-ingestion.philgeran.workers.dev"
TRACE_AI_FLASH_INPUT_USD_PER_MILLION = "1"
TRACE_AI_FLASH_OUTPUT_USD_PER_MILLION = "5"
TRACE_AI_PRO_INPUT_USD_PER_MILLION = "2"
TRACE_AI_PRO_OUTPUT_USD_PER_MILLION = "10"
TRACE_AI_EDITORIAL_DAILY_BUDGET_USD = "0.50"

# Server-only secrets configured with `wrangler pages secret put`:
# DEEPSEEK_API_KEY (only when a governed AI path is intentionally enabled)
# TRACE_VISITOR_HASH_SECRET
# TRACE_INTERNAL_SERVICE_SECRET
# CF_ACCESS_AUD
#
# Server-only variables configured in the Pages environment:
# CF_ACCESS_TEAM_DOMAIN, TRACE_ADMIN_READERS, TRACE_ADMIN_PUBLISHERS, and
# reviewed TRACE_AI_* pricing/budget values.
